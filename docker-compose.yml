services:
  postgres:
    image: postgres:16-alpine
    container_name: orbit-leads-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orbit_leads
    ports:
      - "5432:5432"
    volumes:
      - orbit_leads_postgres:/var/lib/postgresql/data

volumes:
  orbit_leads_postgres:
